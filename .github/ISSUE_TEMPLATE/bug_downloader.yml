name: "Bug Report - Downloader"
description: "Report issues related to macOS installer discovery/download flow."
title: "[Downloader] "
labels: ["bug", "downloader"]
body:
  - type: markdown
    attributes:
      value: |
        Please fill in all required fields.
        Attach diagnostic logs exported from `Help -> Export diagnostic logs...` and screenshots.

  - type: input
    id: app_version
    attributes:
      label: "macUSB version"
      placeholder: "e.g., v2.1"
    validations:
      required: true

  - type: input
    id: host_os_version
    attributes:
      label: "Host macOS version"
      placeholder: "e.g., macOS Sequoia 15.4"
    validations:
      required: true

  - type: dropdown
    id: host_architecture
    attributes:
      label: "Host architecture"
      options:
        - "Apple Silicon"
        - "Intel"
    validations:
      required: true

  - type: dropdown
    id: helper_repair
    attributes:
      label: "Was helper repair executed? (Tools -> Repair helper)"
      options:
        - "Yes"
        - "No"
        - "Not applicable"
    validations:
      required: true

  - type: input
    id: downloaded_system
    attributes:
      label: "Which system were you downloading?"
      placeholder: "e.g., macOS Sonoma 14.7.1"
    validations:
      required: true

  - type: dropdown
    id: failure_stage
    attributes:
      label: "Failure stage"
      options:
        - "Installer list"
        - "Download start"
        - "Downloading"
        - "Verification"
        - "Installer assembly"
        - "Download summary"
    validations:
      required: true

  - type: dropdown
    id: reproducibility
    attributes:
      label: "Is the issue reproducible?"
      options:
        - "Always"
        - "Sometimes"
        - "Happened once"
    validations:
      required: true

  - type: textarea
    id: repro_steps
    attributes:
      label: "Steps to reproduce"
      placeholder: |
        1. Open Downloader
        2. Select ...
        3. Click ...
        4. Observe error
    validations:
      required: true

  - type: textarea
    id: expected_result
    attributes:
      label: "Expected result"
    validations:
      required: true

  - type: textarea
    id: actual_result
    attributes:
      label: "Actual result"
    validations:
      required: true

  - type: checkboxes
    id: attachments_check
    attributes:
      label: "Required attachments"
      options:
        - label: "I attached diagnostic logs exported from `Help -> Export diagnostic logs...`"
          required: true
        - label: "I attached screenshots showing the issue"
          required: true
